        /* Search */

        }
        .lus-input:focus { border-color: var(--accent); }

        /* Grid المطور للكمبيوتر والهاتف */
        .grid {

            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

            justify-content: center;

            background: var(--card); border: 1px solid var(--border);

            display: flex; flex-direction: column; cursor: pointer;
            height: 100%;

            .card:hover {

        .card-type { font-size: 0.65rem; color: var(--accent); font-weight: 900; text-transform: uppercase; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; overflow-y: auto; padding: 20px; align-items: center; justify-content: center; }
        .modal { background: var(--surface); width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; border: 1px solid var(--border); position: relative; }
        .close-x { position: absolute; top: 15px; left: 15px; font-size: 1.5rem; color: var(--text-s); cursor: pointer; }
        
        .step-title { font-size: 0.75rem; color: var(--accent); font-weight: 900; margin: 15px 0 10px; display: block; }
        .opt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; max-height: 200px; overflow-y: auto; }
        .opt-btn { background: #151515; border: 1px solid #222; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.75rem; color: var(--text-s); }
        .opt-btn.active { background: var(--accent); color: #000; font-weight: 900; }

        .btn-dl { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; }

        @media (min-width: 1400px) {
            .grid { 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                max-width: 1600px;
                margin: 0 auto;
            }
        }
    </style>
</head>

    <script>
        const I18N = {
            en: {
                search: "Search projects...",
                cats: { all: "Explore", mod: "Mods", modpack: "Modpacks", resourcepack: "Resource", shader: "Shaders", launcher: "Launchers" },
                stats: { downloads: "Downloads", updated: "Updated", followers: "Followers", dl_btn: "Download Now", by: "By: ", step1: "1. Select Game Version", step2: "2. Select Loader" },
                launch: { premium: "Premium", cracked: "Cracked", mobile: "Android" }
            },
            ar: {
                search: "ابحث عن المشاريع...",
                cats: { all: "اكتشف", mod: "مودات", modpack: "مودباكات", resourcepack: "ريسورس", shader: "شادرات", launcher: "لانشرات" },
                stats: { downloads: "تحميل", updated: "تحديث", followers: "متابع", dl_btn: "تحميل الآن", by: "بواسطة: ", step1: "1. اختر إصدار اللعبة", step2: "2. اختر المشغل" },
                launch: { premium: "رسمي", cracked: "مكرك", mobile: "أندرويد" }
            }
        };

        const LAUNCHERS = [
            { title: "SKLauncher", type: "cracked", i: "https://skmedix.pl/assets/img/sklauncher/icon.png", u: "https://skmedix.pl/sklauncher/downloads" },
            { title: "Official Launcher", type: "premium", i: "https://www.minecraft.net/favicon.ico", u: "https://www.minecraft.net/download" },
            { title: "PojavLauncher", type: "mobile", i: "https://pojavlauncher.org/favicon.ico", u: "https://github.com/PojavLauncherTeam/PojavLauncher/releases" }
        ];

        class LusmistEngine {
            constructor() {
                this.lang = localStorage.getItem('lus-lang') || 'en';
                this.state = { page: 0, query: '', type: '', loading: false, hasMore: true, favorites: JSON.parse(localStorage.getItem('lus-favs') || '[]'), currentVersions: [], selection: { gv: null } };
                this.init();
            }

            init() {
                this.applyLang();
                this.updateFavUI();
                this.fetchData();
                this.bindEvents();
            }

            toggleLang() {
                this.lang = this.lang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lus-lang', this.lang);
                this.applyLang();
                this.resetGrid();
            }

            applyLang() {
                const t = I18N[this.lang];
                document.documentElement.lang = this.lang;
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                document.getElementById('lang-btn').innerText = this.lang === 'en' ? 'AR' : 'EN';
                document.getElementById('main-search').placeholder = t.search;
                const catList = document.getElementById('cat-list');
                catList.innerHTML = Object.entries(t.cats).map(([key, val]) => `
                    <div class="cat-chip ${this.state.type === (key==='all'?'':key) ? 'active' : ''}" 
                         onclick="core.setCat(this, '${key==='all'?'':key}')">${val}</div>
                `).join('');
                document.querySelectorAll('[data-t]').forEach(el => { el.innerText = t.stats[el.dataset.t]; });
            }

            setCat(el, type) {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                this.state.type = type;
                this.resetGrid();
            }

            bindEvents() {
                document.getElementById('main-search').oninput = (e) => {
                    this.state.query = e.target.value;
                    clearTimeout(this.timer);
                    this.timer = setTimeout(() => this.resetGrid(), 600);
                };
                window.onscroll = () => {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) this.fetchData();
                };
            }

            async fetchData() {
                if (this.state.loading || !this.state.hasMore) return;
                if (this.state.type === 'launcher') return this.renderLaunchers();

                this.state.loading = true;
                document.getElementById('scroll-anchor').style.display = 'block';
                const facet = this.state.type ? `&facets=${encodeURIComponent(JSON.stringify([[`project_type:${this.state.type}`]]))}` : '';
                const url = `https://api.modrinth.com/v2/search?query=${this.state.query}&offset=${this.state.page * 20}&limit=20${facet}`;

                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    this.state.hasMore = data.hits.length === 20;
                    this.renderCards(data.hits);
                    this.state.page++;
                } catch(e) { console.error(e); } 
                finally {
                    this.state.loading = false;
                    document.getElementById('scroll-anchor').style.display = 'none';
                }
            }

            renderCards(hits, append = true) {
                const grid = document.getElementById('main-grid');
                if (!append) grid.innerHTML = '';
                hits.forEach(hit => {
                    const id = hit.project_id || hit.id;
                    const isFav = this.state.favorites.some(f => f.id === id);
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="fav-btn ${isFav?'active':''}" onclick="core.toggleFav(event, '${id}', '${hit.title.replace(/'/g,"")}', '${hit.icon_url}')"><i class="fas fa-heart"></i></div>
                        <div onclick="core.openProject('${id}')">
                            <div class="card-img-wrap"><img src="${hit.icon_url}" class="card-img" loading="lazy"></div>
                            <div class="card-body"><div class="card-title">${hit.title}</div></div>
                        </div>`;
                    grid.appendChild(div);
                });
            }

            renderLaunchers() {
                const grid = document.getElementById('main-grid');
                const t = I18N[this.lang].launch;
                grid.innerHTML = '';
                LAUNCHERS.forEach(l => {
                    const div = document.createElement('div');
                    div.className = 'card'; div.style.padding = '20px'; div.style.textAlign = 'center';
                    div.onclick = () => window.open(l.u);
                    div.innerHTML = `<img src="${l.i}" style="width:50px;margin-bottom:10px;"><br><span class="l-badge l-${l.type}">${t[l.type]}</span><div class="card-title">${l.title}</div>`;
                    grid.appendChild(div);
                });
                this.state.hasMore = false;
            }

            async openProject(id) {
                document.getElementById('modal-overlay').style.display = 'flex';
                this.resetModalUI();
                const t = I18N[this.lang].stats;
                try {
                    const [p, v] = await Promise.all([
                        fetch(`https://api.modrinth.com/v2/project/${id}`).then(r => r.json()),
                        fetch(`https://api.modrinth.com/v2/project/${id}/version`).then(r => r.json())
                    ]);
                    this.state.currentVersions = v;
                    document.getElementById('m-title').innerText = p.title;
                    document.getElementById('m-img').src = p.icon_url;
                    document.getElementById('m-author').innerText = `${t.by}${p.author || 'Dev'}`;
                    document.getElementById('m-dl').innerText = this.formatNum(p.downloads);
                    document.getElementById('m-update').innerText = new Date(p.updated).toLocaleDateString(this.lang==='ar'?'ar-EG':'en-US');
                    
                    const gvSet = [...new Set(v.flatMap(x => x.game_versions))]
                                  .filter(gv => /^\d+\.\d+(\.\d+)?$/.test(gv))
                                  .sort((a,b) => b.localeCompare(a, undefined, {numeric: true}));
                    
                    document.getElementById('gv-grid').innerHTML = gvSet.map(g => `<div class="opt-item" onclick="core.selectGV(this, '${g}')">${g}</div>`).join('');
                } catch(e) { this.closeModal(); }
            }

            selectGV(el, gv) {
                document.querySelectorAll('#gv-grid .opt-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                this.state.selection.gv = gv;
                const loaders = [...new Set(this.state.currentVersions.filter(v => v.game_versions.includes(gv)).flatMap(v => v.loaders))];
                document.getElementById('loader-section').style.display = 'block';
                document.getElementById('loader-grid').innerHTML = loaders.map(l => `<div class="opt-item" onclick="core.selectL(this, '${l}')">${l.toUpperCase()}</div>`).join('');
                document.getElementById('btn-final-dl').style.display = 'none';
            }

            selectL(el, l) {
                document.querySelectorAll('#loader-grid .opt-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                const ver = this.state.currentVersions.find(v => v.game_versions.includes(this.state.selection.gv) && v.loaders.includes(l));
                if (ver && ver.files[0]) {
                    const btn = document.getElementById('btn-final-dl');
                    btn.style.display = 'flex';
                    btn.onclick = () => window.open(ver.files[0].url);
                }
            }

            toggleFav(e, id, title, icon) {
                e.stopPropagation();
                const idx = this.state.favorites.findIndex(f => f.id === id);
                if (idx > -1) this.state.favorites.splice(idx, 1);
                else this.state.favorites.push({ id, title, icon_url: icon });
                localStorage.setItem('lus-favs', JSON.stringify(this.state.favorites));
                this.updateFavUI();
                e.currentTarget.classList.toggle('active');
            }

            showFavorites() { this.state.type = 'fav'; this.renderCards(this.state.favorites, false); }
            updateFavUI() { document.getElementById('fav-num').innerText = this.state.favorites.length; }
            resetGrid() { this.state.page = 0; this.state.hasMore = true; document.getElementById('main-grid').innerHTML = ''; this.fetchData(); }
            resetModalUI() {
                document.getElementById('gv-grid').innerHTML = '...';
                document.getElementById('loader-section').style.display = 'none';
                document.getElementById('btn-final-dl').style.display = 'none';
            }
            closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
            formatNum(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'K' : n; }
            switchTab(t, el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
                if (t === 'home') this.resetGrid();
            }
        }
        const core = new LusmistEngine();
    </script>
</body>
</html>
